{% extends "base.html" %}
{% block content %}
<h2>✏️ Редактировать</h2>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post">
    <p><input type="text" name="name" value="{{ wish.name }}" required></p>
    <p><input type="number" step="0.01" name="price" value="{{ wish.price }}" required></p>
    <p><input type="url" name="link" value="{{ wish.link }}"></p>
    <p><button type="submit">Обновить</button> <a href="/">Отмена</a></p>
</form>
{% endblock %}
