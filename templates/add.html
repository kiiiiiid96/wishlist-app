{% extends "base.html" %}
{% block content %}
<h2>➕ Добавить желание</h2>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post">
    <p><input type="text" name="name" placeholder="Название" required></p>
    <p><input type="number" step="0.01" name="price" placeholder="Цена" required></p>
    <p><input type="url" name="link" placeholder="Ссылка (необязательно)"></p>
    <p><button type="submit">Сохранить</button> <a href="/">Отмена</a></p>
</form>
{% endblock %}
